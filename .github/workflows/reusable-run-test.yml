name: workflow-runner
on: 
  workflow_call:
    inputs:
      job-name:
        required: true
        type: string
      labels:
        required: true
        type: string
      workflow-tmpl-name:
        required: true
        type: string
      workflow-template-ns:
        required: true
        type: string
      delay-destroy:
        required: true
        type: string
      addon-url:
        required: true
        type: string
      addon-name:
        required: true
        type: string
      sc4s-version:
        required: true
        type: string
      sc4s-docker-registry:
        required: true
        type: string
    secrets:
      GH_TOKEN_ADMIN:
        description: Github admin token
        required: true
      GH_TOKEN:
        description: Github token
        required: true
      SEMGREP_PUBLISH_TOKEN:
        description: Semgrep token
        required: true
      AWS_ACCESS_KEY_ID:
        description: AWS access key id
        required: true
      AWS_DEFAULT_REGION:
        description: AWS default region
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: AWS secret access key
        required: true
      VT_API_KEY:
        description: Virustotal api key
        required: true
      CODECOV_TOKEN:
        description: Codecov token
        required: true
      OTHER_TA_REQUIRED_CONFIGS:
        description: other required configs
        required: true
      FOSSA_API_KEY:
        description: API token for FOSSA app
        required: true

jobs:
  test-stage:
    runs-on: ubuntu-latest
    steps:
      - name: testing
        shell: bash
        run: echo "Hello Galaxy"
      - name: test-stage
        shell: bash
        run: echo "Hello Universe"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id:
          aws-secret-access-key:
          aws-region:
      - name: Read secrets from AWS Secrets Manager into environment variables
        id: get-argo-token
        run: |
          ARGO_TOKEN=$(aws secretsmanager get-secret-value --secret-id ta-github-workflow-automation-token | jq -r '.SecretString')
          echo "::set-output name=argo-token::$ARGO_TOKEN"
      - name: create job name
        id: create-job-name
        shell: bash
        run: |
          RANDOM_STRING=$(head -3 /dev/urandom | tr -cd '[:lower:]' | cut -c -4)
          JOB_NAME
          JOB_NAME=${JOB_NAME//TEST-TYPE
          JOB_NAME=${JOB_NAME//[_.]/-}
          JOB_NAME=$(echo "$JOB_NAME" | tr '[:upper:]' '[:lower:]')
          echo "::set-output name=job-name::$JOB_NAME"
      - name: run-tests
        id: run-tests
        env:
          ARGO_TOKEN:
        uses: splunk/wfe-test-runner-action@v1.6.1
        with:
          splunk:
          test-type:
          test-args: ""
          job-name:
          labels:
          workflow-tmpl-name:
          workflow-template-ns:
          delay-destroy: "No"
          addon-url:
          addon-name:
          sc4s-version:
          sc4s-docker-registry:
